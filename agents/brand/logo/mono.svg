<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <title>Обиход — Круг сезонов — mono (ч/б для печати)</title>
  <desc>Инженерный чертёж-циркуляр: внешний круг, внутренний круг, крест делит на 4 квадранта сезонного цикла. NW весна-осень (дерево-ёлочка), NE зима (снежинка-роза ветров), SW круглый год (план-грид двора), SE круглый год (навес с вывозом). Центр — wordmark ОБИХОД · КРУГ СЕЗОНОВ.</desc>

  <defs>
    <style>
      .stroke-main { fill: none; stroke: #1c1c1c; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-soft { fill: none; stroke: #1c1c1c; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; opacity: 0.75; }
      .stroke-thick { fill: none; stroke: #1c1c1c; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .fill-ink { fill: #1c1c1c; }
      .fill-bg { fill: #ffffff; }
      .label-sm { font-family: 'Inter','Helvetica Neue',Arial,sans-serif; font-size: 18px; font-weight: 500; letter-spacing: 6px; fill: #1c1c1c; opacity: 0.7; }
      .label-wordmark { font-family: 'Inter','Helvetica Neue',Arial,sans-serif; font-size: 68px; font-weight: 800; letter-spacing: -1.5px; fill: #1c1c1c; }
      .label-tag { font-family: 'Inter','Helvetica Neue',Arial,sans-serif; font-size: 16px; font-weight: 500; letter-spacing: 5px; fill: #1c1c1c; opacity: 0.7; }
    </style>
  </defs>

  <!-- Background (crem / bumaga) -->
  <rect width="1200" height="1200" class="fill-bg"/>

  <!-- Outer ring -->
  <circle cx="600" cy="600" r="560" class="stroke-thick"/>
  <!-- Inner ring -->
  <circle cx="600" cy="600" r="435" class="stroke-soft"/>

  <!-- Cross (horizontal + vertical axes) -->
  <line x1="40" y1="600" x2="1160" y2="600" class="stroke-soft"/>
  <line x1="600" y1="40" x2="600" y2="1160" class="stroke-soft"/>

  <!-- ===== NW quadrant · Весна — Осень · ёлочка-herringbone ===== -->
  <g transform="translate(300 330)">
    <!-- стержень (длинный, верх без декора) -->
    <line x1="0" y1="-150" x2="0" y2="150" class="stroke-main"/>
    <!-- ветки (4 пары, только нижняя половина стержня) -->
    <g class="stroke-main">
      <line x1="0" y1="-20" x2="-60" y2="12"/>
      <line x1="0" y1="-20" x2="60"  y2="12"/>
      <line x1="0" y1="30"  x2="-72" y2="64"/>
      <line x1="0" y1="30"  x2="72"  y2="64"/>
      <line x1="0" y1="78"  x2="-72" y2="112"/>
      <line x1="0" y1="78"  x2="72"  y2="112"/>
      <line x1="0" y1="122" x2="-52" y2="150"/>
      <line x1="0" y1="122" x2="52"  y2="150"/>
    </g>
  </g>

  <!-- ===== NE quadrant · Зима · снежинка (роза ветров) ===== -->
  <g transform="translate(900 330)">
    <g class="stroke-main">
      <!-- вертикаль -->
      <line x1="0" y1="-130" x2="0" y2="130"/>
      <!-- горизонталь -->
      <line x1="-130" y1="0" x2="130" y2="0"/>
      <!-- диагонали -->
      <line x1="-92" y1="-92" x2="92" y2="92"/>
      <line x1="92"  y1="-92" x2="-92" y2="92"/>
      <!-- наконечники (arrow heads) -->
      <polyline points="-10,-118 0,-130 10,-118"/>
      <polyline points="-10,118  0,130  10,118"/>
      <polyline points="-118,-10 -130,0 -118,10"/>
      <polyline points="118,-10  130,0  118,10"/>
    </g>
    <!-- центр: кольцо + точка -->
    <circle cx="0" cy="0" r="9" class="stroke-main"/>
    <circle cx="0" cy="0" r="2.6" class="fill-ink"/>
  </g>

  <!-- ===== SW quadrant · Круглый год · план-грид двора ===== -->
  <g transform="translate(300 900)">
    <!-- внешняя рамка -->
    <rect x="-115" y="-70" width="230" height="140" class="stroke-main"/>
    <!-- горизонтальная перегородка -->
    <line x1="-115" y1="-4" x2="115" y2="-4" class="stroke-main"/>
    <!-- верхняя вертикаль (слегка правее центра — левая ячейка шире) -->
    <line x1="18" y1="-70" x2="18" y2="-4" class="stroke-main"/>
    <!-- нижняя вертикаль (явно левее центра — левая ячейка узкая, правая широкая) -->
    <line x1="-42" y1="-4" x2="-42" y2="70" class="stroke-main"/>
  </g>

  <!-- ===== SE quadrant · Круглый год · навес + вывоз (стрелки вверх) ===== -->
  <g transform="translate(900 900)">
    <!-- П-образная рамка (открыта снизу) -->
    <polyline points="-100,60 -100,-60 100,-60 100,60" class="stroke-main"/>
    <!-- верхняя крышка (дублирующая линия — карниз) -->
    <line x1="-118" y1="-60" x2="118" y2="-60" class="stroke-main"/>
    <!-- 3 вертикальных стрелки вверх -->
    <g class="stroke-main">
      <!-- левая: прямая палочка -->
      <line x1="-48" y1="50" x2="-48" y2="-20"/>
      <!-- центральная: с наконечником -->
      <line x1="0" y1="50" x2="0" y2="-36"/>
      <polyline points="-14,-20 0,-36 14,-20"/>
      <!-- правая: прямая палочка -->
      <line x1="48" y1="50" x2="48" y2="-20"/>
    </g>
  </g>

  <!-- ===== Центральный wordmark ===== -->
  <text x="600" y="595" text-anchor="middle" class="label-wordmark">ОБИХОД</text>
  <text x="600" y="642" text-anchor="middle" class="label-tag">КРУГ СЕЗОНОВ</text>

  <!-- ===== Подписи квадрантов ===== -->
  <text x="300" y="170" text-anchor="middle" class="label-sm">ВЕСНА — ОСЕНЬ</text>
  <text x="900" y="170" text-anchor="middle" class="label-sm">ЗИМА</text>
  <text x="300" y="1055" text-anchor="middle" class="label-sm">КРУГЛЫЙ ГОД</text>
  <text x="900" y="1055" text-anchor="middle" class="label-sm">КРУГЛЫЙ ГОД</text>
</svg>
