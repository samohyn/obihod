<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" width="1280" height="480">
  <title>Обиход — horizontal-compact lockup (знак + wordmark, без tagline)</title>
  <desc>Компактный горизонтальный lockup без подписи «круг сезонов» — для website header, footer, embed (32-60 px по высоте). Полный horizontal.svg с tagline — только для применений ≥ 80 px по высоте (marketing-hero, визитки, email-подпись).</desc>

  <defs>
    <style>
      .stroke-main { fill: none; stroke: currentColor; stroke-width: 5.8; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-soft { fill: none; stroke: currentColor; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; opacity: 0.75; }
      .stroke-thick { fill: none; stroke: currentColor; stroke-width: 7.8; stroke-linecap: round; stroke-linejoin: round; }
      .fill-ink { fill: currentColor; }
      .label-wordmark { font-family: 'Inter','Helvetica Neue',Arial,sans-serif; font-size: 160px; font-weight: 800; letter-spacing: -4px; fill: currentColor; }
    </style>
  </defs>

  <g color="#2d5a3d">
    <g transform="translate(240 240) scale(0.36)">
      <circle cx="0" cy="0" r="560" class="stroke-thick"/>
      <circle cx="0" cy="0" r="435" class="stroke-soft"/>
      <line x1="-560" y1="0" x2="560" y2="0" class="stroke-soft"/>
      <line x1="0" y1="-560" x2="0" y2="560" class="stroke-soft"/>

      <g transform="translate(-300 -270)">
        <line x1="0" y1="-150" x2="0" y2="150" class="stroke-main"/>
        <g class="stroke-main">
          <line x1="0" y1="-20" x2="-60" y2="12"/>
          <line x1="0" y1="-20" x2="60"  y2="12"/>
          <line x1="0" y1="30"  x2="-72" y2="64"/>
          <line x1="0" y1="30"  x2="72"  y2="64"/>
          <line x1="0" y1="78"  x2="-72" y2="112"/>
          <line x1="0" y1="78"  x2="72"  y2="112"/>
          <line x1="0" y1="122" x2="-52" y2="150"/>
          <line x1="0" y1="122" x2="52"  y2="150"/>
        </g>
      </g>

      <g transform="translate(300 -270)">
        <g class="stroke-main">
          <line x1="0" y1="-130" x2="0" y2="130"/>
          <line x1="-130" y1="0" x2="130" y2="0"/>
          <line x1="-92" y1="-92" x2="92" y2="92"/>
          <line x1="92"  y1="-92" x2="-92" y2="92"/>
          <polyline points="-10,-118 0,-130 10,-118"/>
          <polyline points="-10,118  0,130  10,118"/>
          <polyline points="-118,-10 -130,0 -118,10"/>
          <polyline points="118,-10  130,0  118,10"/>
        </g>
        <circle cx="0" cy="0" r="9" class="stroke-main"/>
        <circle cx="0" cy="0" r="2.6" class="fill-ink"/>
      </g>

      <g transform="translate(-300 300)">
        <rect x="-115" y="-70" width="230" height="140" class="stroke-main"/>
        <line x1="-115" y1="-4" x2="115" y2="-4" class="stroke-main"/>
        <line x1="18" y1="-70" x2="18" y2="-4" class="stroke-main"/>
        <line x1="-42" y1="-4" x2="-42" y2="70" class="stroke-main"/>
      </g>

      <g transform="translate(300 300)">
        <polyline points="-100,60 -100,-60 100,-60 100,60" class="stroke-main"/>
        <line x1="-118" y1="-60" x2="118" y2="-60" class="stroke-main"/>
        <g class="stroke-main">
          <line x1="-48" y1="50" x2="-48" y2="-20"/>
          <line x1="0" y1="50" x2="0" y2="-36"/>
          <polyline points="-14,-20 0,-36 14,-20"/>
          <line x1="48" y1="50" x2="48" y2="-20"/>
        </g>
      </g>
    </g>

    <text x="520" y="295" class="label-wordmark">ОБИХОД</text>
  </g>
</svg>
