services:
  postgres:
    image: postgres:16-alpine
    container_name: obikhod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: obikhod
      POSTGRES_PASSWORD: obikhod_dev
      POSTGRES_DB: obikhod
    ports:
      - "5432:5432"
    volumes:
      - obikhod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obikhod -d obikhod"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  obikhod_pgdata:
