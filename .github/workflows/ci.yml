name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DATABASE_URI: postgres://obikhod:obikhod_dev@localhost:5432/obikhod
  PAYLOAD_SECRET: ci-secret-do-not-use-in-production-32bytes
  SITE_URL: http://localhost:3000
  NEXT_PUBLIC_SITE_URL: http://localhost:3000
  REVALIDATE_SECRET: ci-revalidate-secret
  INDEXNOW_KEY: 00000000000000000000000000000000

jobs:
  quality:
    name: Lint · Type-check · Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: site/package.json
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      # US-0 Track C, AC-5: TOV-checker как CI gate.
      # На baseline (W1) запускается на пустом dataset (нет seed-content
      # с живыми текстами в репо ещё) — exit 0 при отсутствии аргументов
      # обернётся через find. Когда появятся .md в site/content/ или
      # seosite/, заменим на shell-expansion list.
      - name: TOV-check (anti-patterns)
        run: |
          # ищем наши markdown в content/seosite, если их пока нет — пропускаем без fail
          files=$(find ../seosite -name '*.md' -not -path '*/node_modules/*' 2>/dev/null | head -50 || true)
          if [ -z "$files" ]; then
            echo "[ci] no .md files to check yet — skipping tov-check"
            exit 0
          fi
          pnpm run tov:check $files

  e2e:
    name: Build · Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: obikhod
          POSTGRES_PASSWORD: obikhod_dev
          POSTGRES_DB: obikhod
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: site/package.json
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('site/pnpm-lock.yaml') }}-chromium

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Cache Next.js build (.next/cache)
        uses: actions/cache@v5
        with:
          path: site/.next/cache
          key: next-cache-${{ runner.os }}-${{ hashFiles('site/pnpm-lock.yaml') }}-${{ hashFiles('site/**/*.ts', 'site/**/*.tsx', 'site/next.config.ts') }}
          restore-keys: |
            next-cache-${{ runner.os }}-${{ hashFiles('site/pnpm-lock.yaml') }}-
            next-cache-${{ runner.os }}-

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U obikhod && break
            sleep 1
          done

      - name: "Warmup DB (dev server — push:true в dev/ci создаёт схему по всем коллекциям)"
        # В dev/ci payload.config.ts использует push:true (см. условный expr).
        # Это создаёт ephemeral schema с нуля по текущей Payload config.
        # Миграция US-3 (diff к prod-state) не применяется в CI — и не должна,
        # потому что push уже создаёт финальную схему.
        # На проде — push:false (через NODE_ENV=production) + миграция через psql в deploy.yml.
        # SAFETY: timeout-minutes ограничивает шаг 5 минутами вместо 6 часов GHA default.
        # Incident 2026-05-01 (PR #133): warmup висел 60min на seed admin из-за audit hook
        # pool starvation. Лучше fail-fast чем тратить minutes на zombie job.
        timeout-minutes: 5
        run: |
          pnpm dev > /tmp/dev.log 2>&1 &
          DEV=$!
          for i in $(seq 1 60); do
            curl -fsS http://localhost:3000/ -o /dev/null 2>/dev/null && { echo "dev ready after ${i}s"; break; }
            sleep 2
          done
          # Дёргаем эндпоинты-представители каждой коллекции, чтобы Payload
          # гарантированно push'нул все связанные таблицы.
          # trailingSlash: true → нужно -L чтобы проследовать по 308 и дёрнуть реальные страницы
          for path in /sitemap.xml /raiony/ /kejsy/ /arboristika/ /arboristika/ramenskoye/ /raiony/ramenskoye/; do
            code=$(curl -sL -o /dev/null -w "%{http_code}" "http://localhost:3000${path}" || echo 000)
            echo "  warmup $path → $code"
          done
          # Создаём admin user, иначе /admin/login редиректит на /admin/create-first-user
          # и Playwright admin-login.spec.ts не находит form.login__form. Idempotent:
          # при повторном вызове Payload вернёт 403 (already initialised) — это OK.
          # КРИТИЧНО: trailing slash + -L. trailingSlash:true в next.config.ts
          # редиректит /api/users/first-register → /api/users/first-register/ (308),
          # без -L curl остановится на редиректе и тело не дойдёт до handler.
          echo "  seeding admin user via /api/users/first-register/..."
          # --max-time 30: отсечка против re-incident 2026-05-01 (audit hook
          # pool starvation вешал endpoint навсегда). Если что-то опять висит —
          # лучше fail быстро и видеть dev.log, чем час ждать GHA timeout.
          seed_resp=$(curl --max-time 30 -sSL -X POST http://localhost:3000/api/users/first-register/ \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@obikhod.test","password":"ci-test-password-12345","name":"CI Admin","role":"admin"}' \
            -w "\nHTTP_CODE:%{http_code}" || echo "CURL_FAILED_OR_TIMEOUT")
          echo "  first-register response: $seed_resp"
          # Verify admin создан — /api/users/me на свежем cookie должен 200
          # (но без login сессии тут просто проверим что users count > 0)
          users_count=$(curl --max-time 15 -sSL http://localhost:3000/api/users?limit=1 | grep -o '"totalDocs":[0-9]*' | head -1)
          echo "  users in DB: $users_count"
          kill $DEV 2>/dev/null || true
          wait $DEV 2>/dev/null || true
          echo "--- dev log tail ---"
          tail -30 /tmp/dev.log || true

      - name: Build
        run: pnpm run build

      - name: Start Next.js
        run: |
          pnpm run start > server.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for the server to respond
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/ -o /dev/null; then
              echo "Server up after $i attempts"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start in 60s"
          cat server.log
          exit 1

      - name: Run Playwright (desktop + mobile chromium — critical path)
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_EXTERNAL_SERVER: "1"
        # W15: Critical-path = 3 data-independent specs (sustained pattern
        # seo.spec.ts:74 skip seeded tests). CI uses push:true schema без
        # реального seed → stage*-capture / leadqa-smoke specs (требующие
        # seeded priority-B SD / blog / cases) fail на пустой DB.
        # Heritage 20 specs (etalons-w3, stage1-w7, stage2-w11, stage3-w13,
        # leadqa-w14, admin-*, panel-*) → Stage 4 backlog: cron nightly full
        # E2E на seeded DB ИЛИ CI_PLAYWRIGHT_SCOPE=full env-trigger.
        # leadqa real-browser smoke 16/16 PASS (commit b402bb5) sustained
        # для current sprint verification.
        run: |
          pnpm exec playwright test --project=chromium --project=mobile-chrome \
            tests/e2e/landing.spec.ts \
            tests/e2e/seo.spec.ts \
            tests/e2e/site-chrome.spec.ts

      # US-1 Stage 1 Track C (W7 transition): lint:schema жёсткий gate.
      # Stage 0 был soft-fail (continue-on-error=true). После W7 Stage 1 имеет
      # 25 живых страниц с заполненной schema → переключаем в hard gate.
      # Скрипт сам exit 0 на errors=0 (warns игнорируются — non-blocking).
      - name: lint:schema (JSON-LD validation)
        run: pnpm run lint:schema --url http://localhost:3000 --sample 10

      - name: Stop Next.js
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: site/playwright-report/
          retention-days: 14

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: site/server.log
          retention-days: 7
