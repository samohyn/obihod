name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DATABASE_URI: postgres://obikhod:obikhod_dev@localhost:5432/obikhod
  PAYLOAD_SECRET: ci-secret-do-not-use-in-production-32bytes
  SITE_URL: http://localhost:3000
  NEXT_PUBLIC_SITE_URL: http://localhost:3000
  REVALIDATE_SECRET: ci-revalidate-secret
  INDEXNOW_KEY: 00000000000000000000000000000000

jobs:
  quality:
    name: Lint · Type-check · Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: site/package.json
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

  e2e:
    name: Build · Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: obikhod
          POSTGRES_PASSWORD: obikhod_dev
          POSTGRES_DB: obikhod
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: site/package.json
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('site/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U obikhod && break
            sleep 1
          done

      - name: "Warmup DB (dev server — Payload push:true создаёт схему)"
        run: |
          pnpm dev > /tmp/dev.log 2>&1 &
          DEV=$!
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/ -o /dev/null 2>/dev/null; then
              echo "dev ready after ${i}s"
              # вторая запрос — чтобы Payload точно прошёл init (Services коллекция)
              curl -fsS http://localhost:3000/sitemap.xml -o /dev/null || true
              break
            fi
            sleep 2
          done
          kill $DEV 2>/dev/null || true
          wait $DEV 2>/dev/null || true
          echo "--- dev log tail ---"
          tail -20 /tmp/dev.log || true

      - name: Build
        run: pnpm run build

      - name: Start Next.js
        run: |
          pnpm run start > server.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for the server to respond
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/ -o /dev/null; then
              echo "Server up after $i attempts"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start in 60s"
          cat server.log
          exit 1

      - name: Run Playwright
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_EXTERNAL_SERVER: "1"
        run: pnpm exec playwright test --project=chromium

      - name: Stop Next.js
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: site/playwright-report/
          retention-days: 14

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: site/server.log
          retention-days: 7
