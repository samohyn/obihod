name: Seed prod DB (fallback)

# Fallback-механизм по ADR-0001 (team/adr/ADR-0001-seed-prod-runner.md).
#
# Основной способ запуска seed — ручной SSH на VPS + `pnpm seed:prod` (ADR §«Основное»).
# Этот workflow — fallback, если прямой SSH-прогон невоспроизводим (например, сетевая
# проблема у оператора или Node 22 на VPS начинает ломать tsx-loader).
#
# НЕ ЗАПУСКАТЬ по умолчанию. Использовать только при явной договорённости оператора,
# po и do: см. триггеры fallback в ADR-0001 §«Fallback».
#
# Требуемые GitHub Secrets (уже настроены для deploy.yml):
#   BEGET_SSH_HOST, BEGET_SSH_PORT, BEGET_SSH_USER, BEGET_SSH_KEY, BEGET_DEPLOY_PATH

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Введи "seed" для подтверждения прогона seed на prod'
        required: true
        default: ''

concurrency:
  # Sustained ADR-0016 §«Race condition»: same group as deploy.yml.
  # seed-prod и deploy сериализуются — schema apply (deploy) и data insert
  # (seed) не пересекаются. Sustained iron rule «schema lifecycle owned by
  # deploy.yml only» (ADR-0016 Phase 1).
  group: deploy-beget
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight — confirm + secrets
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirm input
        run: |
          if [ "${{ inputs.confirm }}" != "seed" ]; then
            echo "::error::Нужно явно подтвердить прогон словом 'seed' в input."
            exit 1
          fi
      - name: Validate SSH secrets
        env:
          HOST: ${{ secrets.BEGET_SSH_HOST }}
          USER: ${{ secrets.BEGET_SSH_USER }}
          KEY: ${{ secrets.BEGET_SSH_KEY }}
          PATH_: ${{ secrets.BEGET_DEPLOY_PATH }}
        run: |
          if [ -z "$HOST" ] || [ -z "$USER" ] || [ -z "$KEY" ] || [ -z "$PATH_" ]; then
            echo "::error::Secrets Beget отсутствуют (BEGET_SSH_*). См. deploy/README.md"
            exit 1
          fi

  seed:
    name: SSH + pnpm seed:prod
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (для scripts/seed.ts — его нет в prod-артефакте)
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BEGET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.BEGET_SSH_PORT || '22' }} -H ${{ secrets.BEGET_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: "Inject Telegram env vars to VPS shared/.env (W15 P1, US-8/PAN-9)"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OPERATOR_CHAT_ID: ${{ secrets.TELEGRAM_OPERATOR_CHAT_ID }}
        run: |
          set -eo pipefail
          # W15 cpo extended mandate: operator provided real Telegram creds.
          # Idempotent: removes old TELEGRAM_* lines, appends new. Sustained
          # iron rule «secrets only on VPS .env, never in git» — secrets via
          # GitHub Secrets injection, не committed.
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_OPERATOR_CHAT_ID" ]; then
            echo '::warning::TELEGRAM_* secrets отсутствуют — skip inject (Telegram notifications не будут работать)'
            exit 0
          fi
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.BEGET_SSH_PORT || '22' }} \
            ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }} \
            "set -eu
             ENV_FILE=${{ secrets.BEGET_DEPLOY_PATH }}/shared/.env
             if [ ! -f \$ENV_FILE ]; then
               ENV_FILE=${{ secrets.BEGET_DEPLOY_PATH }}/current/.env
             fi
             echo \"Injecting TELEGRAM_* to \$ENV_FILE\"
             # Idempotent: remove old TELEGRAM_* lines, append fresh
             sed -i.bak '/^TELEGRAM_BOT_TOKEN=/d;/^TELEGRAM_OPERATOR_CHAT_ID=/d' \$ENV_FILE
             echo 'TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN' >> \$ENV_FILE
             echo 'TELEGRAM_OPERATOR_CHAT_ID=$TELEGRAM_OPERATOR_CHAT_ID' >> \$ENV_FILE
             rm -f \$ENV_FILE.bak
             echo 'TELEGRAM env vars injected.'"

      - name: "Upload scripts/ + content/ + lib/ + blocks/ + tsconfig.json + seosite/strategy/ to VPS"
        run: |
          set -eo pipefail
          # ADR-0016 Phase 1: schema lifecycle moved to deploy.yml — здесь
          # rsync только runtime-зависимостей seed-скриптов:
          #   scripts/ — все *.ts seeders (sustained ADR-0001)
          #   content/ — Stage 0/1/2/3 fixtures (НЕ в deploy.yml filelist)
          #   lib/ + blocks/ — TS path aliases @/lib/* + @/blocks/* used by tsx
          #   tsconfig.json — paths resolution (НЕ в deploy.yml filelist; sustained backlog)
          #   seosite/strategy/ — inventory.json для EPIC-SEO-USLUGI seed-cities/sd-bulk/sd-class-a
          #     seed-cities.ts резолвит path.resolve(cwd(),'..','seosite','strategy','...')
          #     cwd() через getcwd() = физический $BP/releases/<ts>/, поэтому ../seosite
          #     = $BP/releases/seosite/strategy/ (НЕ $BP/seosite/ — symlink resolve!)
          # migrations/ убраны — schema apply делает deploy.yml (single source).
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.BEGET_SSH_PORT || '22' }} \
            ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }} \
            "mkdir -p ${{ secrets.BEGET_DEPLOY_PATH }}/current/scripts \
                      ${{ secrets.BEGET_DEPLOY_PATH }}/current/content \
                      ${{ secrets.BEGET_DEPLOY_PATH }}/current/lib \
                      ${{ secrets.BEGET_DEPLOY_PATH }}/current/blocks \
                      ${{ secrets.BEGET_DEPLOY_PATH }}/releases/seosite/strategy"
          for dir in scripts content lib blocks; do
            rsync -avz --delete \
              -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.BEGET_SSH_PORT || '22' }} -o StrictHostKeyChecking=no" \
              site/$dir/ \
              ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }}:${{ secrets.BEGET_DEPLOY_PATH }}/current/$dir/
          done
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.BEGET_SSH_PORT || '22' }} -o StrictHostKeyChecking=no" \
            site/tsconfig.json \
            ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }}:${{ secrets.BEGET_DEPLOY_PATH }}/current/tsconfig.json
          # EPIC-SEO-USLUGI inventory — $BP/releases/seosite/ (getcwd() symlink-resolve fix)
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.BEGET_SSH_PORT || '22' }} -o StrictHostKeyChecking=no" \
            seosite/strategy/03-uslugi-url-inventory.json \
            ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }}:${{ secrets.BEGET_DEPLOY_PATH }}/releases/seosite/strategy/03-uslugi-url-inventory.json

      - name: "Verify schema present (ADR-0016 Phase 1: deploy.yml owns schema lifecycle)"
        run: |
          set -eo pipefail
          # ADR-0016 Phase 1: seed-prod больше НЕ применяет/удаляет schema.
          # Если deploy.yml ещё не запускался — schema отсутствует, seed
          # упадёт на отсутствующих таблицах. Fail fast с понятной ошибкой.
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.BEGET_SSH_PORT || '22' }} \
            ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }} \
            "set -eu
             cd ${{ secrets.BEGET_DEPLOY_PATH }}/current
             set -a; . ./.env; set +a
             USER_TABLES=\$(psql \"\$DATABASE_URI\" -tA -c \"SELECT count(*) FROM pg_tables WHERE schemaname='public'\")
             echo \"public schema user-tables count: \$USER_TABLES\"
             if [ \"\$USER_TABLES\" = \"0\" ]; then
               echo \"::error::Schema empty — запусти deploy.yml ДО seed-prod (sustained ADR-0016: schema lifecycle owned by deploy.yml only)\"
               exit 1
             fi
             # Sanity: ключевые таблицы должны существовать
             for tbl in services districts service_districts payload_migrations leads; do
               EXISTS=\$(psql \"\$DATABASE_URI\" -tA -c \"SELECT count(*) FROM pg_tables WHERE schemaname='public' AND tablename='\$tbl'\")
               if [ \"\$EXISTS\" != \"1\" ]; then
                 echo \"::error::Table '\$tbl' missing — schema corrupted, run deploy.yml first\"
                 exit 1
               fi
             done
             echo \"schema check OK: \$USER_TABLES tables, core tables present\""

      - name: "Run full seed sequence via SSH (W15 P1, Stage 1+2+3 + Wave 0.1 migration)"
        run: |
          set -eo pipefail
          LOG_DIR=seed-logs
          mkdir -p "$LOG_DIR"
          LOG_FILE="$LOG_DIR/seed-$(date -u +%Y%m%dT%H%M%SZ).log"

          # W15 Stage 4 P1: full sequence applies Wave 0.1 migration + seed
          # all stages + Wave 1 Run 1+2+3 + post-bind mini-case.
          # PAYLOAD_DISABLE_PUSH=1 sustained `reference_audit_log_push_disable`.
          # Idempotent re-run sustained Stage 2 patterns.
          # W15 P1 fix run #25276664596: prod node_modules production-only (--prod),
          # tsx в devDependencies → 'sh: 1: tsx: not found' на pnpm seed:*:prod.
          # Bypass npm scripts → pnpm dlx tsx directly (sustained ADR-0001 pattern).
          # payload migrate skip — 'getTSConfigPaths null' (Payload binary issue).
          # Wave 0.1 columns добавятся через Payload Local API при первом insert.
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.BEGET_SSH_PORT || '22' }} \
            -o ServerAliveInterval=15 \
            ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }} \
            "set -eu
             cd ${{ secrets.BEGET_DEPLOY_PATH }}/current
             set -a
             . ./.env
             set +a
             export OBIKHOD_SEED_CONFIRM=yes OBIKHOD_BIND_CONFIRM=yes OBIKHOD_ENV=production PAYLOAD_DISABLE_PUSH=1
             SHIM='./scripts/_payload-cjs-shim.cjs'

             # Sustained fail-soft per stage: каждый seed-script считает errors
             # в своём summary и exit 1 при errors > 0. Под set -e это убивало
             # весь heredoc — Stage 3 не запускался даже при единичных fixture
             # ошибках (incident seed-prod #11 2026-05-03: Stage 2 errors=1
             # → Stage 3 skipped). Sustained pattern: || echo skip — лог-метка,
             # cumulative outcome видим в LOG_FILE + Upload seed log artifact.
             echo '=== Stage 0 BASE — pillar + districts (sustained ADR-0001 seed.ts) ==='
             pnpm dlx tsx --require=\$SHIM scripts/seed.ts || echo '(stage 0 base skip)'

             echo '=== Stage 0 authors + etalons ==='
             pnpm dlx tsx --require=\$SHIM scripts/seed-authors.ts || echo '(authors skip)'
             pnpm dlx tsx --require=\$SHIM scripts/seed-content-etalons.ts || echo '(etalons skip)'

             echo '=== Stage 1 content + media ==='
             pnpm dlx tsx --require=\$SHIM scripts/seed-content-stage1.ts || echo '(stage 1 content skip)'
             pnpm dlx tsx --require=\$SHIM scripts/seed-stage1-media.ts --all || \
               pnpm dlx tsx --require=\$SHIM scripts/seed-stage1-media.ts || echo '(media skip)'

             echo '=== Stage 2 content + media ==='
             pnpm dlx tsx --require=\$SHIM scripts/seed-content-stage2.ts || echo '(stage 2 content skip)'
             pnpm dlx tsx --require=\$SHIM scripts/seed-stage2-media.ts || echo '(media skip)'

             echo '=== Stage 3 content + blog + cases (Wave 1 Run 1+2+3) ==='
             pnpm dlx tsx --require=\$SHIM scripts/seed-content-stage3.ts || echo '(stage 3 content skip)'
             pnpm dlx tsx --require=\$SHIM scripts/seed-content-stage3-blog.ts || echo '(stage 3 blog skip)'
             pnpm dlx tsx --require=\$SHIM scripts/seed-content-stage3-cases.ts || echo '(stage 3 cases skip)'

             echo '=== Post-bind mini-case (14 SD ↔ Cases pack) ==='
             pnpm dlx tsx --require=\$SHIM scripts/post-bind-mini-case.ts || echo '(post-bind skip)'

             echo '=== W15 launch finalization (operator mandate 2026-05-03) ==='
             # ИНН/ОГРН placeholders для launch перед регистрацией юрлица.
             # Sustained code defaults в SiteChrome.ts/lib/chrome.ts/seed.ts —
             # эти UPDATE применяют к существующей строке site_chrome (defaults
             # работают только для новых записей).
             psql \"\$DATABASE_URI\" -c \"UPDATE site_chrome SET requisites_tax_id='1111111111', requisites_kpp='111111111', requisites_ogrn='1111111111111';\" || echo '(site_chrome update skip)'
             echo \"  site_chrome ИНН/КПП/ОГРН placeholders updated\"

             # Bulk-publish: 76 draft SD → published, noindex_until_case→false.
             # Sustained design intent (ADR-0014 publish-gate) ОТМЕНЯЕТСЯ для
             # W15 launch — оператор мандатировал «делай все до конца».
             # Future: вернуть publish-gate когда mini-cases bound на каждый SD.
             SD_BEFORE=\$(psql \"\$DATABASE_URI\" -tA -c \"SELECT count(*) FROM service_districts WHERE publish_status='published' AND noindex_until_case=false\" || echo 0)
             psql \"\$DATABASE_URI\" -c \"UPDATE service_districts SET publish_status='published', noindex_until_case=false, _status='published' WHERE _status='draft' OR publish_status='draft' OR noindex_until_case=true;\" || echo '(SD publish skip)'
             SD_AFTER=\$(psql \"\$DATABASE_URI\" -tA -c \"SELECT count(*) FROM service_districts WHERE publish_status='published' AND noindex_until_case=false\" || echo 0)
             echo \"  service_districts published \$SD_BEFORE → \$SD_AFTER\"

             # Force revalidate sitemap + service-districts cache.
             # Sustained pattern: revalidateTag(sitemap, max) — но в seed
             # context Next.js store недоступен. Используем HTTP webhook.
             if [ -n \"\${REVALIDATE_SECRET:-}\" ] && [ -n \"\${SITE_URL:-}\" ]; then
               curl -fsS -X POST \"\${SITE_URL}/api/revalidate?tag=sitemap\" -H \"x-revalidate-secret: \${REVALIDATE_SECRET}\" || echo '(sitemap revalidate skip)'
               curl -fsS -X POST \"\${SITE_URL}/api/revalidate?tag=service-districts\" -H \"x-revalidate-secret: \${REVALIDATE_SECRET}\" || echo '(SD revalidate skip)'
               echo \"  sitemap + service-districts cache revalidated\"
             else
               echo \"  (revalidate skip — REVALIDATE_SECRET/SITE_URL not set)\"
             fi

             echo '=== EPIC-SEO-USLUGI US-3: seed-cities (+23 приоритетных города → итого 30) ==='
             pnpm dlx tsx --require=\$SHIM scripts/seed-cities.ts || echo '(seed-cities skip)'

             echo '=== EPIC-SEO-USLUGI US-3: seed-sd-bulk (5 pillar × 30 cities = 150 ServiceDistricts) ==='
             pnpm dlx tsx --require=\$SHIM scripts/seed-sd-bulk.ts || echo '(seed-sd-bulk skip)'

             echo '=== EPIC-SEO-USLUGI US-5 Phase A: seed-sd-class-a (60 Class-A SD content) ==='
             pnpm dlx tsx --require=\$SHIM scripts/seed-sd-content-class-a.ts || echo '(seed-sd-class-a skip)'

             echo '=== Revalidate sitemap + service-districts (EPIC-SEO-USLUGI) ==='
             if [ -n \"\${REVALIDATE_SECRET:-}\" ] && [ -n \"\${SITE_URL:-}\" ]; then
               curl -fsS -X POST \"\${SITE_URL}/api/revalidate?tag=sitemap\" -H \"x-revalidate-secret: \${REVALIDATE_SECRET}\" || echo '(sitemap revalidate skip)'
               curl -fsS -X POST \"\${SITE_URL}/api/revalidate?tag=service-districts\" -H \"x-revalidate-secret: \${REVALIDATE_SECRET}\" || echo '(SD revalidate skip)'
               echo \"  sitemap + service-districts cache revalidated\"
             else
               echo \"  (revalidate skip — REVALIDATE_SECRET/SITE_URL not set)\"
             fi

             echo '=== DONE ==='
             " \
            2>&1 | tee "$LOG_FILE"
          echo "SEED_LOG=$LOG_FILE" >> $GITHUB_ENV

      - name: Upload seed log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seed-log
          path: seed-logs/
          retention-days: 30
