name: Seed prod DB (fallback)

# Fallback-механизм по ADR-0001 (team/adr/ADR-0001-seed-prod-runner.md).
#
# Основной способ запуска seed — ручной SSH на VPS + `pnpm seed:prod` (ADR §«Основное»).
# Этот workflow — fallback, если прямой SSH-прогон невоспроизводим (например, сетевая
# проблема у оператора или Node 22 на VPS начинает ломать tsx-loader).
#
# НЕ ЗАПУСКАТЬ по умолчанию. Использовать только при явной договорённости оператора,
# po и do: см. триггеры fallback в ADR-0001 §«Fallback».
#
# Требуемые GitHub Secrets (уже настроены для deploy.yml):
#   BEGET_SSH_HOST, BEGET_SSH_PORT, BEGET_SSH_USER, BEGET_SSH_KEY, BEGET_DEPLOY_PATH

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Введи "seed" для подтверждения прогона seed на prod'
        required: true
        default: ''

concurrency:
  group: seed-prod
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight — confirm + secrets
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirm input
        run: |
          if [ "${{ inputs.confirm }}" != "seed" ]; then
            echo "::error::Нужно явно подтвердить прогон словом 'seed' в input."
            exit 1
          fi
      - name: Validate SSH secrets
        env:
          HOST: ${{ secrets.BEGET_SSH_HOST }}
          USER: ${{ secrets.BEGET_SSH_USER }}
          KEY: ${{ secrets.BEGET_SSH_KEY }}
          PATH_: ${{ secrets.BEGET_DEPLOY_PATH }}
        run: |
          if [ -z "$HOST" ] || [ -z "$USER" ] || [ -z "$KEY" ] || [ -z "$PATH_" ]; then
            echo "::error::Secrets Beget отсутствуют (BEGET_SSH_*). См. deploy/README.md"
            exit 1
          fi

  seed:
    name: SSH + pnpm seed:prod
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (для scripts/seed.ts — его нет в prod-артефакте)
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BEGET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.BEGET_SSH_PORT || '22' }} -H ${{ secrets.BEGET_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: "Upload scripts/ + content/ + migrations/ + lib/ + blocks/ to VPS (W15 P1)"
        run: |
          set -eo pipefail
          # W15 Stage 4 P1: full sequence требует scripts/ (все *.ts seeders),
          # content/ (Stage 1+2+3 fixtures), migrations/ (Wave 0.1 SD schema),
          # lib/ + blocks/ (TS path aliases @/lib/* + @/blocks/* used in collections).
          # Sustained ADR-0001 fallback расширён — было только seed.ts.
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.BEGET_SSH_PORT || '22' }} \
            ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }} \
            "mkdir -p ${{ secrets.BEGET_DEPLOY_PATH }}/current/scripts \
                      ${{ secrets.BEGET_DEPLOY_PATH }}/current/content \
                      ${{ secrets.BEGET_DEPLOY_PATH }}/current/migrations \
                      ${{ secrets.BEGET_DEPLOY_PATH }}/current/lib \
                      ${{ secrets.BEGET_DEPLOY_PATH }}/current/blocks"
          for dir in scripts content migrations lib blocks; do
            rsync -avz --delete \
              -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.BEGET_SSH_PORT || '22' }} -o StrictHostKeyChecking=no" \
              site/$dir/ \
              ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }}:${{ secrets.BEGET_DEPLOY_PATH }}/current/$dir/
          done
          # tsconfig.json missing from deploy.yml filelist → tsx loader не resolves @/* aliases.
          # Sustained backlog: extend deploy.yml filelist (deploy/README.md update).
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.BEGET_SSH_PORT || '22' }} -o StrictHostKeyChecking=no" \
            site/tsconfig.json \
            ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }}:${{ secrets.BEGET_DEPLOY_PATH }}/current/tsconfig.json

      - name: "Apply initial schema bootstrap via psql (W15 P1 — production DB пустая)"
        run: |
          set -eo pipefail
          # Sustained do.md §9 blocker «БД пустая». 5-я попытка seed выявила
          # 'relation services_blocks_hero does not exist' — production Postgres
          # никогда не получал Payload schema. Sustained iron rule push:false на
          # проде → используем raw SQL dump из dev/CI Postgres (где push:true
          # создаёт schema). Idempotent re-run: psql variant '\dt|grep' check.
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.BEGET_SSH_PORT || '22' }} \
            ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }} \
            "set -eu
             cd ${{ secrets.BEGET_DEPLOY_PATH }}/current
             set -a
             . ./.env
             set +a
             # Idempotent check — apply schema только если services_blocks_hero отсутствует
             EXISTS=\$(echo \"SELECT 1 FROM pg_tables WHERE tablename='services_blocks_hero';\" | psql \"\$DATABASE_URI\" -tA 2>/dev/null || echo '')
             if [ -n \"\$EXISTS\" ]; then
               echo 'Schema already applied — skipping bootstrap'
             else
               echo 'Applying initial schema bootstrap (233 tables)...'
               psql \"\$DATABASE_URI\" -f migrations/00000000_000000_initial_schema_bootstrap.sql
               echo 'Schema bootstrap complete.'
             fi"

      - name: "Run full seed sequence via SSH (W15 P1, Stage 1+2+3 + Wave 0.1 migration)"
        run: |
          set -eo pipefail
          LOG_DIR=seed-logs
          mkdir -p "$LOG_DIR"
          LOG_FILE="$LOG_DIR/seed-$(date -u +%Y%m%dT%H%M%SZ).log"

          # W15 Stage 4 P1: full sequence applies Wave 0.1 migration + seed
          # all stages + Wave 1 Run 1+2+3 + post-bind mini-case.
          # PAYLOAD_DISABLE_PUSH=1 sustained `reference_audit_log_push_disable`.
          # Idempotent re-run sustained Stage 2 patterns.
          # W15 P1 fix run #25276664596: prod node_modules production-only (--prod),
          # tsx в devDependencies → 'sh: 1: tsx: not found' на pnpm seed:*:prod.
          # Bypass npm scripts → pnpm dlx tsx directly (sustained ADR-0001 pattern).
          # payload migrate skip — 'getTSConfigPaths null' (Payload binary issue).
          # Wave 0.1 columns добавятся через Payload Local API при первом insert.
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.BEGET_SSH_PORT || '22' }} \
            -o ServerAliveInterval=15 \
            ${{ secrets.BEGET_SSH_USER }}@${{ secrets.BEGET_SSH_HOST }} \
            "set -eu
             cd ${{ secrets.BEGET_DEPLOY_PATH }}/current
             set -a
             . ./.env
             set +a
             export OBIKHOD_SEED_CONFIRM=yes OBIKHOD_ENV=production PAYLOAD_DISABLE_PUSH=1
             SHIM='./scripts/_payload-cjs-shim.cjs'

             echo '=== Stage 0 authors + etalons ==='
             pnpm dlx tsx --require=\$SHIM scripts/seed-authors.ts || echo '(authors skip)'
             pnpm dlx tsx --require=\$SHIM scripts/seed-content-etalons.ts || echo '(etalons skip)'

             echo '=== Stage 1 content + media ==='
             pnpm dlx tsx --require=\$SHIM scripts/seed-content-stage1.ts
             pnpm dlx tsx --require=\$SHIM scripts/seed-stage1-media.ts --all || \
               pnpm dlx tsx --require=\$SHIM scripts/seed-stage1-media.ts || echo '(media skip)'

             echo '=== Stage 2 content + media ==='
             pnpm dlx tsx --require=\$SHIM scripts/seed-content-stage2.ts
             pnpm dlx tsx --require=\$SHIM scripts/seed-stage2-media.ts || echo '(media skip)'

             echo '=== Stage 3 content + blog + cases (Wave 1 Run 1+2+3) ==='
             pnpm dlx tsx --require=\$SHIM scripts/seed-content-stage3.ts
             pnpm dlx tsx --require=\$SHIM scripts/seed-content-stage3-blog.ts
             pnpm dlx tsx --require=\$SHIM scripts/seed-content-stage3-cases.ts

             echo '=== Post-bind mini-case (14 SD ↔ Cases pack) ==='
             pnpm dlx tsx --require=\$SHIM scripts/post-bind-mini-case.ts || echo '(post-bind skip)'

             echo '=== DONE ==='
             " \
            2>&1 | tee "$LOG_FILE"
          echo "SEED_LOG=$LOG_FILE" >> $GITHUB_ENV

      - name: Upload seed log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seed-log
          path: seed-logs/
          retention-days: 30
