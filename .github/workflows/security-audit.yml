name: Security audit

on:
  schedule:
    # Понедельник 05:00 UTC = 08:00 MSK
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: site/package.json
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: pnpm install (deps graph only)
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run audit — high+critical fail the build
        id: audit
        run: |
          set +e
          pnpm audit --audit-level high --json > /tmp/audit.json
          RC=$?
          echo "rc=$RC" >> $GITHUB_OUTPUT
          echo "--- summary ---"
          jq '.metadata.vulnerabilities // {}' /tmp/audit.json || cat /tmp/audit.json
          exit $RC

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit
          path: /tmp/audit.json
          retention-days: 30

      - name: Create/update issue on failure
        if: failure() && steps.audit.outputs.rc != '0' && github.event_name == 'schedule'
        uses: actions/github-script@v9
        with:
          script: |
            const title = '⚠️ pnpm audit: high/critical CVE'
            const body = [
              'Еженедельный security audit обнаружил high/critical уязвимости.',
              '',
              'Логи и JSON-отчёт: Actions → Security audit → Artifacts → pnpm-audit',
              '',
              `Run: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}`,
            ].join('\n')
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
            })
            const existing = issues.find(i => i.title === title)
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number,
                body: `Ещё раз подсвечено: run ${{github.run_id}}`,
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['security', 'dependencies'],
              })
            }
